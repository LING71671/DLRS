name: validate

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  validate:
    name: Validate repository, schemas, and registry
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r tools/requirements.txt

      - name: Check that no raw sensitive files are committed
        run: python tools/check_sensitive_files.py

      - name: Validate JSON Schemas (lint)
        run: python tools/lint_schemas.py

      - name: Validate all manifests in repo and examples
        run: |
          python tools/validate_repo.py
          python tools/validate_examples.py

      - name: Validate pointer media metadata
        run: python tools/validate_media.py

      - name: Run registry generation tests
        run: python tools/test_registry.py

      - name: Build public registry
        run: python tools/build_registry.py

      - name: Upload registry artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dlrs-registry
          path: |
            registry/humans.index.jsonl
            registry/humans.index.csv
          if-no-files-found: warn
